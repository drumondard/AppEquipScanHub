version: '3.8'

services:
  app-equip-scan-hub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=http://10.130.12.13:82
        - HTTPS_PROXY=http://10.130.12.13:82
        - http_proxy=http://10.130.12.13:82
        - https_proxy=http://10.130.12.13:82
    container_name: app-equip-scan-hub
    restart: always
    ports:
      # Mapeamento da porta no Servidor 10.119.13.58
      # Se a porta 3000 do host estiver ocupada, você pode alterar para "3001:3000" ou "8080:3000"
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://10.121.243.101:8083/v1}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - LITELLM_MODEL=${LITELLM_MODEL:-gemini-3.6-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
